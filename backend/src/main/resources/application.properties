# --- Database Configuration ---
# Use environment variables for Render, defaults to your Aiven DB for local testing
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Security & JWT ---
# Use an env var for the secret in production!
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# Cookies: 'true' is required for HTTPS on Render
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=Strict

# --- CORS & Networking ---
# Render will provide these URLs automatically via the render.yaml we made
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
app.upload.base-url=${BACKEND_URL:http://localhost:8080}/uploads

# --- File Upload Configuration ---
app.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB